<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #21262d;
  --fg:      #c9d1d9;
  --fg-hi:   #f0f6fc;
  --muted:   #484f58;
  --accent:  #6366f1;
  --glow:    rgba(99, 102, 241, 0.18);
  --nav-h:   60px;
  --mx: -999px;
  --my: -999px;
}

/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── SPOTLIGHT ───────────────────────────────────────────── */
#spotlight {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.4s;
  background: radial-gradient(
    700px circle at var(--mx) var(--my),
    rgba(99, 102, 241, 0.05),
    transparent 40%
  );
}

/* ── NAV ─────────────────────────────────────────────────── */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 100;
  transition: background 0.3s, border-color 0.3s;
  border-bottom: 1px solid transparent;
}
#nav.scrolled {
  background: rgba(13, 17, 23, 0.88);
  backdrop-filter: blur(16px);
  border-color: var(--border);
}
.nav-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--fg-hi);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover,
.nav-links a.active { color: var(--fg-hi); }

/* ── LAYOUT ──────────────────────────────────────────────── */
main {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 2rem;
  position: relative;
  z-index: 1;
}

/* ── SECTION SHARED ──────────────────────────────────────── */
section { padding: 6rem 0; border-top: 1px solid var(--border); }
section:first-child { border-top: none; }

.section-eyebrow {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.5rem;
}
.section-heading {
  font-size: clamp(1.6rem, 4vw, 2.25rem);
  font-weight: 700;
  color: var(--fg-hi);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 1.5rem;
}

/* ── HERO ────────────────────────────────────────────────── */
#hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-top: none;
  padding: calc(var(--nav-h) + 4rem) 0 6rem;
}
.hero-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.hero-label-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
  50%       { opacity: 0.7; box-shadow: 0 0 0 6px rgba(99,102,241,0); }
}
.hero-name {
  font-size: clamp(2.75rem, 9vw, 5.5rem);
  font-weight: 700;
  color: var(--fg-hi);
  letter-spacing: -0.04em;
  line-height: 1.0;
  margin-bottom: 1.25rem;
  text-shadow: 0 0 60px rgba(99, 102, 241, 0.2);
}
.hero-role {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 1.75rem;
}
.hero-tagline {
  font-size: 1.05rem;
  color: var(--fg);
  line-height: 1.75;
  max-width: 560px;
  margin-bottom: 3rem;
}
.hero-cta { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
.cta-link {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--fg-hi);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
}
.cta-link:hover { color: var(--accent); border-color: var(--accent); }
.cta-link.primary { color: var(--accent); border-color: rgba(99,102,241,0.4); }
.cta-link.primary:hover { border-color: var(--accent); }

/* ── ABOUT ───────────────────────────────────────────────── */
.about-bio p {
  color: var(--fg);
  font-size: 1rem;
  line-height: 1.8;
  margin-bottom: 1.25rem;
}
.about-bio p:last-child { margin-bottom: 0; }
.about-facts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  margin-top: 2.5rem;
  padding-top: 2.5rem;
  border-top: 1px solid var(--border);
}
.fact-value {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--fg-hi);
  letter-spacing: -0.03em;
  line-height: 1;
}
.fact-value .accent { color: var(--accent); }
.fact-label {
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 500;
  margin-top: 0.3rem;
}

/* ── SKILLS ──────────────────────────────────────────────── */
.skill-groups { display: flex; flex-direction: column; gap: 1.5rem; }
.skill-group { display: grid; grid-template-columns: 140px 1fr; gap: 1rem; align-items: baseline; }
.skill-group-name {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: 0.1rem;
}
.skill-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.skill-chip {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--fg);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.3rem 0.75rem;
  border-radius: 2px;
  transition: color 0.2s, border-color 0.2s;
  cursor: default;
}
.skill-chip:hover { color: var(--fg-hi); border-color: rgba(99,102,241,0.5); }

/* ── PROJECTS ────────────────────────────────────────────── */
.projects-list { display: flex; flex-direction: column; gap: 1px; }
.project-card {
  display: block;
  text-decoration: none;
  color: inherit;
  padding: 1.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 2px solid rgba(99, 102, 241, 0.2);
  position: relative;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  margin-bottom: 0.75rem;
}
.project-card:last-child { margin-bottom: 0; }
.project-card:hover {
  border-left-color: var(--accent);
  border-color: rgba(99, 102, 241, 0.3);
  box-shadow: 0 0 24px rgba(99, 102, 241, 0.07), inset 0 0 0 0 transparent;
  background: #1a1f2e;
}
.project-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.6rem;
}
.project-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--fg-hi);
  letter-spacing: -0.01em;
  transition: color 0.2s;
}
.project-card:hover .project-title { color: var(--accent); }
.project-meta { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
.project-year { font-size: 0.75rem; color: var(--muted); }
.project-arrow {
  font-size: 0.875rem;
  color: var(--muted);
  transition: color 0.2s, transform 0.2s;
}
.project-card:hover .project-arrow { color: var(--accent); transform: translate(2px, -2px); }
.project-role {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 0.75rem;
}
.project-desc {
  font-size: 0.875rem;
  color: var(--fg);
  line-height: 1.7;
  margin-bottom: 1.25rem;
}
.project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.project-tag {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.2rem 0.55rem;
}

/* ── CONTACT ─────────────────────────────────────────────── */
.contact-text {
  font-size: 1rem;
  color: var(--fg);
  line-height: 1.8;
  margin-bottom: 2rem;
  max-width: 500px;
}
.contact-email {
  display: inline-block;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--fg-hi);
  text-decoration: none;
  letter-spacing: -0.01em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 3px;
  margin-bottom: 2.5rem;
  transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
}
.contact-email:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-shadow: 0 0 20px rgba(99,102,241,0.35);
}
.contact-links { display: flex; gap: 1.25rem; flex-wrap: wrap; }
.contact-link {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  transition: color 0.2s;
}
.contact-link:hover { color: var(--fg-hi); }

/* ── FOOTER ──────────────────────────────────────────────── */
footer {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  font-size: 0.75rem;
  color: var(--muted);
}
footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
footer a:hover { color: var(--fg); }

/* ── FADE IN ─────────────────────────────────────────────── */
.fade-in {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible { opacity: 1; transform: none; }
.fade-in[data-delay="1"] { transition-delay: 0.1s; }
.fade-in[data-delay="2"] { transition-delay: 0.2s; }
.fade-in[data-delay="3"] { transition-delay: 0.3s; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 600px) {
  main { padding: 0 1.25rem; }
  footer { padding: 1.5rem 1.25rem; }
  section { padding: 4rem 0; }
  #hero { padding-top: calc(var(--nav-h) + 2.5rem); }
  .about-facts { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .skill-group { grid-template-columns: 1fr; gap: 0.5rem; }
  #nav { padding: 0 1.25rem; }
}
</style>
</head>
<body>

<div id="spotlight"></div>

<nav id="nav">
  <a class="nav-name" href="#hero" id="nav-name"></a>
  <ul class="nav-links" id="nav-links"></ul>
</nav>

<main>
  <section id="hero">
    <div class="hero-label"><span class="hero-label-dot"></span><span id="hero-label-text"></span></div>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-role" id="hero-role"></p>
    <p class="hero-tagline" id="hero-tagline"></p>
    <div class="hero-cta" id="hero-cta"></div>
  </section>

  <section id="about">
    <p class="section-eyebrow fade-in">About</p>
    <h2 class="section-heading fade-in" id="about-heading"></h2>
    <div class="about-bio" id="about-bio"></div>
    <div class="about-facts" id="about-facts"></div>
  </section>

  <section id="skills">
    <p class="section-eyebrow fade-in">Skills</p>
    <h2 class="section-heading fade-in" id="skills-heading"></h2>
    <div class="skill-groups" id="skill-groups"></div>
  </section>

  <section id="projects">
    <p class="section-eyebrow fade-in">Projects</p>
    <h2 class="section-heading fade-in" id="projects-heading"></h2>
    <div class="projects-list" id="projects-list"></div>
  </section>

  <section id="contact">
    <p class="section-eyebrow fade-in">Contact</p>
    <h2 class="section-heading fade-in" id="contact-heading"></h2>
    <p class="contact-text fade-in" id="contact-text"></p>
    <a class="contact-email fade-in" id="contact-email"></a>
    <div class="contact-links fade-in" id="contact-links"></div>
  </section>
</main>

<footer>
  <span id="footer-copy"></span>
  <span>Built with HTML · CSS · JS</span>
</footer>

<script>
// ============================================================
// DATA — fill in your details here
// ============================================================
const P = {
  name:     'Your Name',
  role:     'Full Stack Developer',
  tagline:  'I design and build thoughtful software — with a focus on clean code, clear interfaces, and real impact.',
  available: true,

  about: [
    `I'm a developer with 5+ years of experience crafting web applications from first sketch to production. I care about the details: fast load times, accessible markup, and code that the next person can actually understand.`,
    `Outside of work I contribute to open source, write about things I've learned, and occasionally mentor junior developers.`,
  ],

  stats: [
    { value: '5+',  label: 'Years experience' },
    { value: '40+', label: 'Projects shipped' },
    { value: '12',  label: 'Clients worked with' },
  ],

  skills: {
    'Languages':   ['TypeScript', 'Python', 'Go', 'SQL'],
    'Frameworks':  ['React', 'Next.js', 'Node.js', 'FastAPI'],
    'Tools':       ['Figma', 'Docker', 'AWS', 'PostgreSQL', 'Redis'],
  },

  projects: [
    {
      name: 'Momentum',
      role: 'Design & Engineering',
      year: '2024',
      desc: 'A habit-tracking app grounded in behavioural psychology. Reached 10k users in the first month without paid acquisition.',
      tags: ['React', 'Node.js', 'PostgreSQL'],
      link: '#',
    },
    {
      name: 'Flux Studio',
      role: 'Frontend Engineering',
      year: '2024',
      desc: 'Real-time collaborative design tool for distributed teams, built on WebSockets and a custom Canvas renderer.',
      tags: ['TypeScript', 'WebSockets', 'Canvas API'],
      link: '#',
    },
    {
      name: 'Beacon',
      role: 'Full Stack Engineering',
      year: '2023',
      desc: 'Emergency response coordination platform deployed across three counties. Reduced average dispatch time by 40%.',
      tags: ['Next.js', 'Mapbox', 'Twilio'],
      link: '#',
    },
    {
      name: 'Drift',
      role: 'Design Systems',
      year: '2023',
      desc: 'A comprehensive design system — tokens, components, documentation — adopted by 8 internal product teams.',
      tags: ['Figma', 'Storybook', 'CSS'],
      link: '#',
    },
  ],

  contact: {
    blurb:    `I'm always open to interesting projects and conversations. Drop me an email and I'll get back to you within a day or two.`,
    email:    'youremail@example.com',
    github:   'https://github.com',
    linkedin: 'https://linkedin.com',
    twitter:  'https://twitter.com',
  },
};

// ============================================================
// RENDER
// ============================================================
function render() {
  document.title = `${P.name} — Portfolio`;

  // Nav
  document.getElementById('nav-name').textContent = P.name;
  document.getElementById('nav-links').innerHTML = [
    ['#about',    'About'],
    ['#skills',   'Skills'],
    ['#projects', 'Work'],
    ['#contact',  'Contact'],
  ].map(([href, label]) => `<li><a href="${href}">${label}</a></li>`).join('');

  // Hero
  document.getElementById('hero-label-text').textContent =
    P.available ? 'Available for work' : 'Portfolio';
  document.getElementById('hero-name').textContent    = P.name;
  document.getElementById('hero-role').textContent    = P.role;
  document.getElementById('hero-tagline').textContent = P.tagline;
  document.getElementById('hero-cta').innerHTML =
    `<a href="#projects" class="cta-link primary">View Work →</a>` +
    `<a href="#contact"  class="cta-link">Get In Touch →</a>`;

  // About
  document.getElementById('about-heading').textContent = 'A bit about me.';
  document.getElementById('about-bio').innerHTML =
    P.about.map(p => `<p class="fade-in">${p}</p>`).join('');
  document.getElementById('about-facts').innerHTML = P.stats.map((s, i) => `
    <div class="fade-in" data-delay="${i + 1}">
      <div class="fact-value">${s.value.replace(/\+$/, '<span class="accent">+</span>')}</div>
      <div class="fact-label">${s.label}</div>
    </div>
  `).join('');

  // Skills
  document.getElementById('skills-heading').textContent = 'What I work with.';
  document.getElementById('skill-groups').innerHTML =
    Object.entries(P.skills).map(([group, items], i) => `
      <div class="skill-group fade-in" data-delay="${(i % 3) + 1}">
        <span class="skill-group-name">${group}</span>
        <div class="skill-list">
          ${items.map(s => `<span class="skill-chip">${s}</span>`).join('')}
        </div>
      </div>
    `).join('');

  // Projects
  document.getElementById('projects-heading').textContent = 'Selected work.';
  document.getElementById('projects-list').innerHTML = P.projects.map(p => `
    <a class="project-card fade-in" href="${p.link}" target="_blank" rel="noopener noreferrer">
      <div class="project-header">
        <span class="project-title">${p.name}</span>
        <span class="project-meta">
          <span class="project-year">${p.year}</span>
          <span class="project-arrow">↗</span>
        </span>
      </div>
      <div class="project-role">${p.role}</div>
      <p class="project-desc">${p.desc}</p>
      <div class="project-tags">
        ${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}
      </div>
    </a>
  `).join('');

  // Contact
  document.getElementById('contact-heading').textContent = 'Say hello.';
  document.getElementById('contact-text').textContent     = P.contact.blurb;
  const emailEl = document.getElementById('contact-email');
  emailEl.href        = `mailto:${P.contact.email}`;
  emailEl.textContent = P.contact.email;

  const socials = [
    ['GitHub',   P.contact.github,   '↗'],
    ['LinkedIn', P.contact.linkedin, '↗'],
    ['Twitter',  P.contact.twitter,  '↗'],
  ].filter(([, url]) => url);
  document.getElementById('contact-links').innerHTML = socials.map(([label, url, icon]) =>
    `<a class="contact-link" href="${url}" target="_blank" rel="noopener noreferrer">${label} ${icon}</a>`
  ).join('');

  // Footer
  document.getElementById('footer-copy').textContent = `© ${new Date().getFullYear()} ${P.name}`;
}

// ============================================================
// NAV — scroll class + active link
// ============================================================
function initNav() {
  const nav   = document.getElementById('nav');
  const links = document.querySelectorAll('.nav-links a');
  const sections = document.querySelectorAll('main section[id]');

  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      links.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + e.target.id);
      });
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  sections.forEach(s => io.observe(s));
}

// ============================================================
// SPOTLIGHT — follows mouse, skipped on touch devices
// ============================================================
function initSpotlight() {
  if (window.matchMedia('(pointer: coarse)').matches) return;
  document.addEventListener('mousemove', e => {
    document.documentElement.style.setProperty('--mx', e.clientX + 'px');
    document.documentElement.style.setProperty('--my', e.clientY + 'px');
  }, { passive: true });
}

// ============================================================
// FADE-IN ON SCROLL
// ============================================================
function initFadeIn() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.fade-in').forEach(el => io.observe(el));
}

render();
initNav();
initSpotlight();
initFadeIn();
</script>
</body>
</html>
